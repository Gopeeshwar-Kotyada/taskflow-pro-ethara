<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

    <div class="container auth-container">
        <div class="row shadow-lg auth-box">

            <div class="col-md-6 left-panel">
                <h1>TaskFlow Pro</h1>
                <p>Smart Team Collaboration & Project Management Platform</p>
                <ul>
                    <li>✔ Role Based Admin & Member Access</li>
                    <li>✔ Project Assignment Dashboard</li>
                    <li>✔ Task Progress Monitoring</li>
                    <li>✔ Overdue Performance Tracking</li>
                </ul>
            </div>

            <div class="col-md-6 right-panel">
                <div class="form-toggle text-center mb-4">
                    <button onclick="showLogin()" class="btn btn-primary me-2">Login</button>
                    <button onclick="showRegister()" class="btn btn-outline-primary">Register</button>
                </div>

                <form id="loginForm">
                    <h3 class="mb-3">Login</h3>
                    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required>
                    <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required>
                    <button type="submit" class="btn btn-primary w-100">Login Now</button>
                </form>

                <form id="registerForm" style="display:none;">
                    <h3 class="mb-3">Register</h3>
                    <input type="text" id="regName" class="form-control mb-3" placeholder="Full Name" required>
                    <input type="email" id="regEmail" class="form-control mb-3" placeholder="Email" required>
                    <input type="password" id="regPassword" class="form-control mb-3" placeholder="Password" required>

                    <select id="regRole" class="form-control mb-3">
                        <option value="Admin">Admin</option>
                        <option value="Member">Member</option>
                    </select>

                    <button type="submit" class="btn btn-success w-100">Create Account</button>
                </form>

                <p id="message" class="mt-3 text-center"></p>
            </div>

        </div>
    </div>

<script src="js/auth.js"></script>
</body>
</html>
