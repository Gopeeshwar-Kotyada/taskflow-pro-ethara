<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethara TaskFlow Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

<div class="container auth-container">
    <div class="row auth-box">
        <div class="col-md-7 left-panel">
            <h1>Ethara TaskFlow</h1>
            <p>Enterprise Grade Team Collaboration & Deadline Monitoring Platform</p>
            <ul>
                <li>✔ Role Based Admin & Member Access</li>
                <li>✔ Project Assignment Dashboard</li>
                <li>✔ Task Progress Monitoring</li>
                <li>✔ Overdue Performance Tracking</li>
            </ul>
        </div>

        <div class="col-md-5 right-panel">
            <div class="mb-4 text-center">
                <button class="btn btn-primary me-2" onclick="showLogin()">Login</button>
                <button class="btn btn-outline-primary" onclick="showRegister()">Register</button>
            </div>

            <form id="loginForm">
                <h2>Login</h2>
                <input type="email" id="loginEmail" class="form-control my-3" placeholder="Email" required>
                <input type="password" id="loginPassword" class="form-control my-3" placeholder="Password" required>
                <button type="submit" class="btn btn-primary w-100">Login Now</button>
            </form>

            <form id="registerForm" style="display:none;">
                <h2>Register</h2>
                <input type="text" id="regName" class="form-control my-3" placeholder="Name" required>
                <input type="email" id="regEmail" class="form-control my-3" placeholder="Email" required>
                <input type="password" id="regPassword" class="form-control my-3" placeholder="Password" required>
                <select id="regRole" class="form-control my-3">
                    <option value="Admin">Admin</option>
                    <option value="Member">Member</option>
                </select>
                <button type="submit" class="btn btn-success w-100">Register Now</button>
            </form>

            <p id="message" class="mt-3 text-center text-danger"></p>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
