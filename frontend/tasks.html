<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - TaskFlow Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

<div class="sidebar">
    <h2>TaskFlow<br>Pro</h2>
  <ul>
    <li onclick="window.location.href='dashboard.html'">📊 Dashboard</li>
    <li onclick="window.location.href='dashboard.html'">📁 Projects</li>
    <li>✅ Tasks</li>
    <li onclick="logout()">🚪 Logout</li>
  </ul>
</div>

<div class="main-content">
    <div class="topbar">
        <h3>Task Management Center</h3>
    </div>

    <div class="task-section">
        <h4>Create New Task</h4>
        <input type="text" id="taskTitle" class="form-control mb-3" placeholder="Task Title">
        <textarea id="taskDesc" class="form-control mb-3" placeholder="Task Description"></textarea>
        <input type="date" id="taskDate" class="form-control mb-3">
        <select id="taskPriority" class="form-control mb-3">
            <option value="Low">Low Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="High">High Priority</option>
        </select>
        <button onclick="createTask()" class="btn btn-success">Create Task</button>
    </div>

    <div class="task-section">
        <h4>All Tasks</h4>
        <div id="taskContainer" class="row"></div>
    </div>
</div>

<script src="js/tasks.js"></script>
</body>
</html>
