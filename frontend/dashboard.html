<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskFlow Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

<div class="sidebar">
    <h2>TaskFlow<br>Pro</h2>
<ul>
    <li>📊 Dashboard</li>
    <li onclick="window.location.href='dashboard.html'">📁 Projects</li>
    <li onclick="window.location.href='tasks.html'">✅ Tasks</li>
    <li onclick="logout()">🚪 Logout</li>
</ul>
</div>

<div class="main-content">
    <div class="topbar">
        <h3 id="welcomeUser">Welcome Admin</h3>
    </div>

    <div class="stats-row">
        <div class="stat-card"><h4>Total Projects</h4><p id="projectCount">0</p></div>
        <div class="stat-card"><h4>Total Tasks</h4><p id="taskCount">0</p></div>
        <div class="stat-card"><h4>Completed</h4><p id="completedCount">0</p></div>
        <div class="stat-card"><h4>Overdue</h4><p id="overdueCount">1</p></div>
    </div>

    <div class="project-form">
        <h4>Create New Project</h4>
        <input type="text" id="projectTitle" class="form-control mb-3" placeholder="Project Title">
        <textarea id="projectDesc" class="form-control mb-3" placeholder="Project Description"></textarea>
        <button onclick="createProject()" class="btn btn-primary">Create Project</button>
    </div>

    <div class="project-list">
        <h4>All Projects</h4>
        <div id="projectsContainer" class="row"></div>
    </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
